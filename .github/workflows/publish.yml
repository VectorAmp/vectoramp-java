name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build signed Maven bundle
        run: gradle clean check publishMavenJavaPublicationToLocalBuildRepository
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
      - name: Upload and publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          cd build/repo
          zip -r ../central-bundle.zip .
          cd ../..

          token=$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 -w0)
          deployment_id=$(curl -fsS \
            -H "Authorization: Bearer ${token}" \
            -F bundle=@build/central-bundle.zip \
            'https://central.sonatype.com/api/v1/publisher/upload?name=vectoramp-java-${{ github.ref_name }}&publishingType=AUTOMATIC')
          echo "deployment_id=${deployment_id}"

          for attempt in $(seq 1 60); do
            status_json=$(curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${token}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${deployment_id}")
            echo "${status_json}"
            state=$(python3 -c 'import json,sys; print(json.load(sys.stdin)["deploymentState"])' <<<"${status_json}")
            case "${state}" in
              PUBLISHED)
                exit 0
                ;;
              FAILED)
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for Maven Central deployment to publish" >&2
          exit 1
